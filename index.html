<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>All-in-One Calculator</title>
<meta name="google-site-verification" content="icGmfZhEIb7U1VZfl5L-AeYI9TrHmMPAq75uYzyyvOo" />

<style>
* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  -webkit-tap-highlight-color: transparent; /* Removes blue highlight on mobile tap */
}

html, body {
  margin: 0;
  padding: 0;
  background: #0f1115;
  height: 100%;
  width: 100%;
  overflow: hidden; /* Prevents bouncing/scrolling */
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Calculator Container - Adjusted for App feel */
.calculator {
  width: 100%;
  max-width: 500px; /* Limit width on tablets but full on mobile */
  height: 100dvh; /* Use Dynamic Viewport Height for mobile browsers */
  background: #15181e;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* Credit Badge - Subtle positioning */
.credit {
  position: absolute;
  bottom: 4px;
  width: 100%;
  text-align: center;
  font-size: 9px;
  color: #444;
  pointer-events: none;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  z-index: 5;
}

/* Top bar */
.top-bar {
  padding: 16px;
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.02);
}

.menu-btn {
  font-size: 24px;
  cursor: pointer;
  padding-right: 15px;
}

.title {
  font-size: 18px;
  font-weight: 500;
  opacity: 0.8;
}

/* Slide Menu */
.menu-container {
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: #2805a8;
  transition: transform 0.3s ease;
  z-index: 100;
}

.menu-container.open {
  transform: translateX(100%);
}

.menu-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Display Area - Flexible to push buttons down */
.display {
  flex: 1;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  text-align: right;
}

.expression {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #888;
  font-size: 28px;
  text-align: right;
  margin-bottom: 10px;
}

.result {
  font-size: 48px;
  font-weight: 600;
  min-height: 58px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* Scientific Buttons Row */
.scientific {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 10px 16px;
}

.scientific button {
  height: 40px;
  font-size: 13px;
  border-radius: 12px;
  background: #252a34;
}

/* Main Buttons Grid */
.buttons {
  padding: 10px 16px 30px 16px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

button {
  height: 70px; /* Slightly taller for better thumb reach */
  border: none;
  border-radius: 20px; /* Modern "Squircle" look */
  background: #1e222b;
  color: white;
  font-size: 22px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.1s, transform 0.1s;
}

button:active {
  background: #323846;
  transform: scale(0.92);
}

.op { background: #2f80ed; color: white; }
.equal { background: #7d8aff; color: white; }
.clear { background: #ff7675; color: white; }

/* Responsive adjustments for smaller phones */
@media (max-height: 670px) {
  button { height: 55px; border-radius: 15px; }
  .result { font-size: 36px; }
}
</style>
</head>

<body>

<div class="calculator">

  <div class="credit">Created by V. Naga Rakesh</div>

  <div id="menu" class="menu-container">
    <iframe src="menu.html"></iframe>
  </div>

  <div class="top-bar">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    <div class="title">Calculator</div>
  </div>

  <div class="display">
    <input id="expression" class="expression" placeholder="0" readonly>
    <div id="result" class="result"></div>
  </div>

  <div class="scientific">
    <button data-v="sin(">sin</button>
    <button data-v="cos(">cos</button>
    <button data-v="tan(">tan</button>
    <button data-v="log(">log</button>
    <button data-v="ln(">ln</button>
  </div>

  <div class="buttons">
    <button class="op" data-act="allclear">AC</button>
    <button class="op" data-v="(">(</button>
    <button class="op" data-v=")">)</button>
    <button class="op" data-v="/">÷</button>

    <button data-v="7">7</button>
    <button data-v="8">8</button>
    <button data-v="9">9</button>
    <button class="op" data-v="*">×</button>

    <button data-v="4">4</button>
    <button data-v="5">5</button>
    <button data-v="6">6</button>
    <button class="op" data-v="-">−</button>

    <button data-v="1">1</button>
    <button data-v="2">2</button>
    <button data-v="3">3</button>
    <button class="op" data-v="+">+</button>

    <button data-v="0">0</button>
    <button data-v=".">.</button>
    <button class="clear" data-act="clear">C</button>
    <button class="equal" data-act="calc">=</button>
  </div>

</div>

<script>
const menu = document.getElementById("menu");

function toggleMenu() {
  menu.classList.toggle("open");
}

const exprInput = document.getElementById("expression");
const resultEl = document.getElementById("result");

// Fixed event listener to handle touch and clicks properly
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener("click", e => {
    const v = btn.dataset.v;
    const act = btn.dataset.act;

    if (v) insertAtCursor(v);
    if (act === "allclear") { exprInput.value = ""; resultEl.textContent = ""; }
    if (act === "clear") backspace();
    if (act === "calc") { 
        if(resultEl.textContent) {
            exprInput.value = resultEl.textContent;
            resultEl.textContent = "";
        }
    }
    liveCalculate();
  });
});

function insertAtCursor(text) {
  exprInput.value += text;
}

function backspace() {
  exprInput.value = exprInput.value.slice(0, -1);
}

function liveCalculate() {
  try {
    let e = exprInput.value
      .replace(/sin/g, "Math.sin")
      .replace(/cos/g, "Math.cos")
      .replace(/tan/g, "Math.tan")
      .replace(/log/g, "Math.log10")
      .replace(/ln/g, "Math.log");
    
    if(e === "") {
        resultEl.textContent = "";
        return;
    }
    
    // Simple math formatting for safety
    let res = eval(e);
    // Round to 8 decimal places to avoid floating point issues (e.g. 0.1+0.2)
    resultEl.textContent = Number.isInteger(res) ? res : parseFloat(res.toFixed(8));
  } catch {
    resultEl.textContent = "";
  }
}
</script>

</body>
</html>
