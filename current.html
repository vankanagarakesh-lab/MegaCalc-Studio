  <style>
    * { font-family: 'Space Grotesk', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .category-card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
      border: 1px solid rgba(56, 189, 248, 0.2);
      transition: all 0.3s ease;
    }
    .category-card:hover {
      border-color: rgba(56, 189, 248, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.3);
    }
    .calc-input {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.3);
      transition: all 0.2s ease;
    }
    .calc-input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
      outline: none;
    }
    .calc-btn {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      transition: all 0.2s ease;
    }
    .calc-btn:hover {
      background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
      transform: scale(1.02);
    }
    .result-box {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .formula-box {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);

      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.5); border-radius: 3px; }
    .nav-item {
      transition: all 0.2s ease;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(56, 189, 248, 0.2);
      color: #38bdf8;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .back-btn {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.3);
      transition: all 0.2s ease;
    }
    .back-btn:hover {
      background: rgba(56, 189, 248, 0.2);
      border-color: #38bdf8;
    }
    @keyframes flowRight {
      0% { transform: translateX(-20px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes flowDown {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
      50% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes counter-up {
      from { content: '0'; }
      to { content: attr(data-value); }
    }
    @keyframes bar-fill {
      from { width: 0%; }
      to { width: var(--fill-width, 100%); }
    }
    .input-flow {
      animation: flowRight 0.6s ease-out forwards;
    }
    .process-glow {
      animation: pulse-glow 2s infinite;
    }
    .spinner {
      animation: spin-slow 2s linear infinite;
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(56, 189, 248, 0.3);
      border-top-color: #38bdf8;
      border-radius: 50%;
    }
    .result-animate {
      animation: flowDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .progress-bar {
      animation: bar-fill 1.2s ease-out forwards;
      background: linear-gradient(90deg, #0ea5e9, #38bdf8);
    }
    .value-counter {
      font-variant-numeric: tabular-nums;
    }
    .circuit-diagram {
      position: relative;
      height: 200px;
      margin: 20px 0;
      padding: 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 10px;
      overflow: hidden;
    }
    .component {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      border-radius: 6px;
      transition: all 0.3s ease;
    }
    .wire {
      position: absolute;
      background: linear-gradient(90deg, transparent, #38bdf8, transparent);
      height: 2px;
    }
    .energy-flow {
      position: absolute;
      width: 8px;
      height: 8px;
      background: radial-gradient(circle, #fbbf24, transparent);
      border-radius: 50%;
      animation: flowPath 2s linear infinite;
    }
    @keyframes flowPath {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    .heat-map {
      position: relative;
      height: 30px;
      margin: 10px 0;
      background: linear-gradient(90deg, #10b981, #fbbf24, #ef4444);
      border-radius: 15px;
      overflow: hidden;
    }
    .heat-indicator {
      position: absolute;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 15px;
      animation: heatFlow 2s ease-in-out infinite;
    }
    @keyframes heatFlow {
      0%, 100% { left: 0%; width: 10%; }
      50% { left: 45%; width: 10%; }
    }
    .wave-animation {
      position: relative;
      height: 60px;
      margin: 20px 0;
    }
    .sine-wave {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .harmonic-bar {
      position: absolute;
      bottom: 0;
      background: linear-gradient(180deg, #0ea5e9, #38bdf8);
      border-radius: 4px 4px 0 0;
      animation: harmonicPulse 1.5s ease-in-out infinite;
    }
    @keyframes harmonicPulse {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.3); }
    }
  </style>

 <body class="h-full bg-slate-900 text-slate-100 overflow-auto">

   <header class="bg-slate-800/80 backdrop-blur-sm border-b border-slate-700 sticky top-0 z-50">

       <div>
        <h1 id="main-title" class="text-xl font-bold text-white">Electrical Engineering Calculator</h1>

   </main><!-- Footer -->

     <p>© 2024 Electrical Engineering Calculator | All formulas based on standard electrical engineering principles</p>

  <script>
    // Configuration
    const defaultConfig = {
      main_title: 'Electrical Engineering Calculator',
      subtitle: 'Complete toolkit for electrical calculations',
      background_color: '#0f172a',
      primary_color: '#38bdf8',
      text_color: '#f1f5f9',
      accent_color: '#10b981',
      secondary_color: '#1e293b'
    };

    // Calculator Categories Data
    const categories = [
      {
        id: 'basic-laws',
        icon: '📐',
        title: 'Basic Electrical Laws',
        description: 'Ohm\'s Law, Kirchhoff\'s Laws, Coulomb\'s Law',
        calculators: [
          {
            id: 'ohms-law',
            name: 'Ohm\'s Law Calculator',
            formula: 'V = I × R',
            explanation: 'Ohm\'s Law states that the current through a conductor between two points is directly proportional to the voltage across the two points. It is one of the most fundamental laws in electrical engineering, discovered by Georg Ohm in 1827.',
            variables: [
              { id: 'voltage', name: 'Voltage (V)', unit: 'Volts', symbol: 'V' },
              { id: 'current', name: 'Current (I)', unit: 'Amperes', symbol: 'A' },
              { id: 'resistance', name: 'Resistance (R)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs, solve) => {
              if (solve === 'voltage') return inputs.current * inputs.resistance;
              if (solve === 'current') return inputs.voltage / inputs.resistance;
              if (solve === 'resistance') return inputs.voltage / inputs.current;
            }
          },
          {
            id: 'power-law',
            name: 'Electrical Power Calculator',
            formula: 'P = V × I = I²R = V²/R',
            explanation: 'Electrical power is the rate at which electrical energy is transferred by an electric circuit. Power can be calculated using voltage and current, or by using current and resistance, or voltage and resistance.',
            variables: [
              { id: 'power', name: 'Power (P)', unit: 'Watts', symbol: 'W' },
              { id: 'voltage', name: 'Voltage (V)', unit: 'Volts', symbol: 'V' },
              { id: 'current', name: 'Current (I)', unit: 'Amperes', symbol: 'A' },
              { id: 'resistance', name: 'Resistance (R)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs, solve) => {
              if (solve === 'power') {
                if (inputs.voltage && inputs.current) return inputs.voltage * inputs.current;
                if (inputs.current && inputs.resistance) return inputs.current * inputs.current * inputs.resistance;
                if (inputs.voltage && inputs.resistance) return (inputs.voltage * inputs.voltage) / inputs.resistance;
              }
              if (solve === 'voltage') {
                if (inputs.power && inputs.current) return inputs.power / inputs.current;
                if (inputs.current && inputs.resistance) return inputs.current * inputs.resistance;
              }
              if (solve === 'current') {
                if (inputs.power && inputs.voltage) return inputs.power / inputs.voltage;
                if (inputs.voltage && inputs.resistance) return inputs.voltage / inputs.resistance;
              }
              if (solve === 'resistance') {
                if (inputs.voltage && inputs.current) return inputs.voltage / inputs.current;
                if (inputs.power && inputs.current) return inputs.power / (inputs.current * inputs.current);
              }
            }
          },
          {
            id: 'coulombs-law',
            name: 'Coulomb\'s Law Calculator',
            formula: 'F = k × (q₁ × q₂) / r²',
            explanation: 'Coulomb\'s Law quantifies the electrostatic force between two charged particles. The force is proportional to the product of the charges and inversely proportional to the square of the distance between them. k = 8.99 × 10⁹ N·m²/C²',
            variables: [
              { id: 'force', name: 'Force (F)', unit: 'Newtons', symbol: 'N' },
              { id: 'q1', name: 'Charge 1 (q₁)', unit: 'Coulombs', symbol: 'C' },
              { id: 'q2', name: 'Charge 2 (q₂)', unit: 'Coulombs', symbol: 'C' },
              { id: 'distance', name: 'Distance (r)', unit: 'Meters', symbol: 'm' }
            ],
            calculate: (inputs, solve) => {
              const k = 8.99e9;
              if (solve === 'force') return k * (inputs.q1 * inputs.q2) / (inputs.distance * inputs.distance);
              if (solve === 'distance') return Math.sqrt(k * inputs.q1 * inputs.q2 / inputs.force);
              if (solve === 'q1') return (inputs.force * inputs.distance * inputs.distance) / (k * inputs.q2);
              if (solve === 'q2') return (inputs.force * inputs.distance * inputs.distance) / (k * inputs.q1);
            }
          }
        ]
      },
      {
        id: 'dc-circuits',
        icon: '🔋',
        title: 'DC Circuit Calculations',
        description: 'Series, Parallel, Theorems, Power Transfer',
        calculators: [
          {
            id: 'series-resistance',
            name: 'Series Resistance Calculator',
            formula: 'R_total = R₁ + R₂ + R₃ + ...',
            explanation: 'In a series circuit, resistors are connected end-to-end, and the total resistance is the sum of all individual resistances. Current is the same through all resistors, but voltage divides across them.',
            variables: [
              { id: 'r1', name: 'Resistance 1 (R₁)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r2', name: 'Resistance 2 (R₂)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r3', name: 'Resistance 3 (R₃)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r4', name: 'Resistance 4 (R₄)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              let total = 0;
              if (inputs.r1) total += inputs.r1;
              if (inputs.r2) total += inputs.r2;
              if (inputs.r3) total += inputs.r3;
              if (inputs.r4) total += inputs.r4;
              return total;
            },
            resultLabel: 'Total Resistance'
          },
          {
            id: 'parallel-resistance',
            name: 'Parallel Resistance Calculator',
            formula: '1/R_total = 1/R₁ + 1/R₂ + 1/R₃ + ...',
            explanation: 'In a parallel circuit, resistors are connected across the same two points. The total resistance is always less than the smallest individual resistance. Voltage is the same across all resistors, but current divides.',
            variables: [
              { id: 'r1', name: 'Resistance 1 (R₁)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r2', name: 'Resistance 2 (R₂)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r3', name: 'Resistance 3 (R₃)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r4', name: 'Resistance 4 (R₄)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              let sum = 0;
              if (inputs.r1) sum += 1/inputs.r1;
              if (inputs.r2) sum += 1/inputs.r2;
              if (inputs.r3) sum += 1/inputs.r3;
              if (inputs.r4) sum += 1/inputs.r4;
              return sum > 0 ? 1/sum : 0;
            },
            resultLabel: 'Total Resistance'
          },
          {
            id: 'voltage-divider',
            name: 'Voltage Divider Calculator',
            formula: 'V_out = V_in × (R₂ / (R₁ + R₂))',
            explanation: 'A voltage divider is a simple circuit that produces an output voltage that is a fraction of the input voltage. It consists of two resistors in series, and the output is taken across one of them.',
            variables: [
              { id: 'vin', name: 'Input Voltage (V_in)', unit: 'Volts', symbol: 'V' },
              { id: 'r1', name: 'Resistance 1 (R₁)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r2', name: 'Resistance 2 (R₂)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              return inputs.vin * (inputs.r2 / (inputs.r1 + inputs.r2));
            },
            resultLabel: 'Output Voltage (V_out)'
          },
          {
            id: 'current-divider',
            name: 'Current Divider Calculator',
            formula: 'I₁ = I_total × (R₂ / (R₁ + R₂))',
            explanation: 'A current divider splits the input current between parallel branches inversely proportional to their resistances. The branch with lower resistance carries more current.',
            variables: [
              { id: 'itotal', name: 'Total Current (I_total)', unit: 'Amperes', symbol: 'A' },
              { id: 'r1', name: 'Resistance 1 (R₁)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'r2', name: 'Resistance 2 (R₂)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              const i1 = inputs.itotal * (inputs.r2 / (inputs.r1 + inputs.r2));
              const i2 = inputs.itotal * (inputs.r1 / (inputs.r1 + inputs.r2));
              return { i1, i2 };
            },
            resultLabel: 'Branch Currents',
            multiResult: true
          },
          {
            id: 'battery-emf',
            name: 'Battery EMF & Internal Resistance',
            formula: 'V_terminal = EMF - I × r_internal',
            explanation: 'Every real battery has internal resistance. The terminal voltage is less than the EMF when current flows. The voltage drop across internal resistance causes this difference.',
            variables: [
              { id: 'emf', name: 'EMF (ε)', unit: 'Volts', symbol: 'V' },
              { id: 'current', name: 'Current (I)', unit: 'Amperes', symbol: 'A' },
              { id: 'rinternal', name: 'Internal Resistance (r)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              return inputs.emf - (inputs.current * inputs.rinternal);
            },
            resultLabel: 'Terminal Voltage'
          },
          {
            id: 'max-power-transfer',
            name: 'Maximum Power Transfer',
            formula: 'P_max = V²/(4R_L) when R_L = R_source',
            explanation: 'Maximum power is transferred to a load when the load resistance equals the source resistance (including internal resistance). This is crucial in power electronics and RF design.',
            variables: [
              { id: 'vsource', name: 'Source Voltage (V)', unit: 'Volts', symbol: 'V' },
              { id: 'rsource', name: 'Source Resistance (R_s)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              const pmax = (inputs.vsource * inputs.vsource) / (4 * inputs.rsource);
              const rload = inputs.rsource;
              return { pmax, rload };
            },
            resultLabel: 'Maximum Power & Optimal Load',
            multiResult: true
          }
        ]
      },
      {
        id: 'ac-circuits',
        icon: '〰️',
        title: 'AC Circuit Calculations',
        description: 'RMS, Reactance, Impedance, Power Factor',
        calculators: [
          {
            id: 'rms-values',
            name: 'RMS, Peak & Average Values',
            formula: 'V_rms = V_peak / √2 ≈ 0.707 × V_peak',
            explanation: 'RMS (Root Mean Square) is the effective value of AC that produces the same heating effect as DC. Peak value is the maximum amplitude. Average value for a full sine wave is 0.637 × Peak.',
            variables: [
              { id: 'vpeak', name: 'Peak Voltage (V_peak)', unit: 'Volts', symbol: 'V' }
            ],
            calculate: (inputs) => {
              const vrms = inputs.vpeak / Math.sqrt(2);
              const vavg = inputs.vpeak * 0.637;
              const vpeakToPeak = inputs.vpeak * 2;
              return { vrms: vrms.toFixed(3), vavg: vavg.toFixed(3), vpp: vpeakToPeak.toFixed(3) };
            },
            resultLabel: 'AC Values',
            multiResult: true
          },
          {
            id: 'inductive-reactance',
            name: 'Inductive Reactance (X_L)',
            formula: 'X_L = 2πfL = ωL',
            explanation: 'Inductive reactance is the opposition to AC current flow by an inductor. It increases with frequency. In an inductor, current lags voltage by 90°.',
            variables: [
              { id: 'frequency', name: 'Frequency (f)', unit: 'Hertz', symbol: 'Hz' },
              { id: 'inductance', name: 'Inductance (L)', unit: 'Henries', symbol: 'H' }
            ],
            calculate: (inputs) => {
              return 2 * Math.PI * inputs.frequency * inputs.inductance;
            },
            resultLabel: 'Inductive Reactance (X_L)'
          },
          {
            id: 'capacitive-reactance',
            name: 'Capacitive Reactance (X_C)',
            formula: 'X_C = 1 / (2πfC)',
            explanation: 'Capacitive reactance is the opposition to AC current flow by a capacitor. It decreases with frequency. In a capacitor, current leads voltage by 90°.',
            variables: [
              { id: 'frequency', name: 'Frequency (f)', unit: 'Hertz', symbol: 'Hz' },
              { id: 'capacitance', name: 'Capacitance (C)', unit: 'Farads', symbol: 'F' }
            ],
            calculate: (inputs) => {
              return 1 / (2 * Math.PI * inputs.frequency * inputs.capacitance);
            },
            resultLabel: 'Capacitive Reactance (X_C)'
          },
          {
            id: 'impedance',
            name: 'Impedance Calculator (RLC)',
            formula: 'Z = √(R² + (X_L - X_C)²)',
            explanation: 'Impedance is the total opposition to AC current flow in a circuit containing resistance and reactance. It combines resistance (real) and reactance (imaginary) components.',
            variables: [
              { id: 'resistance', name: 'Resistance (R)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'xl', name: 'Inductive Reactance (X_L)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'xc', name: 'Capacitive Reactance (X_C)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              const xnet = inputs.xl - inputs.xc;
              const z = Math.sqrt(inputs.resistance * inputs.resistance + xnet * xnet);
              const phase = Math.atan(xnet / inputs.resistance) * (180 / Math.PI);
              return { z: z.toFixed(3), phase: phase.toFixed(2) };
            },
            resultLabel: 'Impedance & Phase Angle',
            multiResult: true
          },
          {
            id: 'power-factor',
            name: 'Power Factor Calculator',
            formula: 'PF = cos(φ) = R/Z = P/S',
            explanation: 'Power factor is the ratio of real power to apparent power. It indicates how effectively electrical power is being used. A PF of 1 means all power is being used effectively.',
            variables: [
              { id: 'resistance', name: 'Resistance (R)', unit: 'Ohms', symbol: 'Ω' },
              { id: 'impedance', name: 'Impedance (Z)', unit: 'Ohms', symbol: 'Ω' }
            ],
            calculate: (inputs) => {
              const pf = inputs.resistance / inputs.impedance;
              const angle = Math.acos(pf) * (180 / Math.PI);
              return { pf: pf.toFixed(4), angle: angle.toFixed(2) };
            },
            resultLabel: 'Power Factor & Phase Angle',
            multiResult: true
          },
          {
            id: 'ac-power',
            name: 'AC Power Triangle Calculator',
            formula: 'S² = P² + Q²',
            explanation: 'In AC circuits, power has three components: Real Power (P) in Watts does actual work, Reactive Power (Q) in VAR oscillates between source and load, and Apparent Power (S) in VA is the total power.',
            variables: [
              { id: 'voltage', name: 'Voltage (V_rms)', unit: 'Volts', symbol: 'V' },
              { id: 'current', name: 'Current (I_rms)', unit: 'Amperes', symbol: 'A' },
              { id: 'pf', name: 'Power Factor', unit: '', symbol: '' }
            ],
            calculate: (inputs) => {
              const s = inputs.voltage * inputs.current;
              const p = s * inputs.pf;
              const q = s * Math.sqrt(1 - inputs.pf * inputs.pf);
              return { 
                apparent: s.toFixed(2), 
                real: p.toFixed(2), 
                reactive: q.toFixed(2) 
              };
            },
            resultLabel: 'Power Values',
            multiResult: true
          },
          {
            id: 'resonance',
            name: 'Resonance Frequency Calculator',
            formula: 'f_r = 1 / (2π√(LC))',
            explanation: 'At resonance, inductive and capacitive reactances are equal, canceling each other. The circuit behaves as purely resistive with maximum current (series) or minimum current (parallel).',
            variables: [

              { id: 'current', name: 'Current (I)', unit: 'Amperes', symbol: 'A' },
              { id: 'length', name: 'Cable Length (L)', unit: 'Meters', symbol: 'm' },
              { id: 'vdrop', name: 'Allowable Voltage Drop', unit: 'Volts', symbol: 'V' },
              { id: 'resistivity', name: 'Resistivity (ρ)', unit: 'Ω·mm²/m', symbol: 'Ω·mm²/m' }
            ],
            calculate: (inputs) => {
              const area = (2 * inputs.resistivity * inputs.length * inputs.current) / (inputs.vdrop);
              return area.toFixed(2);
            },
            resultLabel: 'Cable Cross-Section (mm²)'
          },
          {
            id: 'earthing-resistance',
            name: 'Earth Electrode Resistance',
            formula: 'R = ρ / (2πL) × ln(4L/d)',
            explanation: 'Earth electrode resistance depends on soil resistivity, electrode length, and diameter. Lower resistance provides better fault current path and safety.',
            variables: [
              { id: 'resistivity', name: 'Soil Resistivity (ρ)', unit: 'Ω·m', symbol: 'Ω·m' },
              { id: 'length', name: 'Electrode Length (L)', unit: 'Meters', symbol: 'm' },
              { id: 'diameter', name: 'Electrode Diameter (d)', unit: 'Meters', symbol: 'm' }
            ],
            calculate: (inputs) => {
              return (inputs.resistivity / (2 * Math.PI * inputs.length)) * Math.log(4 * inputs.length / inputs.diameter);
            },
            resultLabel: 'Earth Resistance (Ω)'
          },
          {
            id: 'circuit-breaker',
            name: 'Circuit Breaker Rating',
            formula: 'I_rated ≥ I_load × 1.25 (continuous)',
            explanation: 'Circuit breaker must be rated above maximum continuous load current with safety margin. Also consider short circuit breaking capacity and coordination with upstream devices.',
            variables: [
              { id: 'loadCurrent', name: 'Load Current', unit: 'Amperes', symbol: 'A' },
              { id: 'safetyFactor', name: 'Safety Factor', unit: '', symbol: '' }
            ],
            calculate: (inputs) => {
              const minRating = inputs.loadCurrent * inputs.safetyFactor;
              const standardRatings = [6, 10, 16, 20, 25, 32, 40, 50, 63, 80, 100, 125, 160, 200, 250, 315, 400, 500, 630];
              const recommended = standardRatings.find(r => r >= minRating) || 'Above 630A';
              return { min: minRating.toFixed(1), recommended };
            },
            resultLabel: 'CB Rating',
            multiResult: true
          },
          {
            id: 'transformer-sizing',
            name: 'Transformer Sizing Calculator',
            formula: 'kVA = (Total Connected Load × DF) / PF',
            explanation: 'Transformer capacity must handle connected load considering demand factor and power factor. Add margin for future expansion (typically 20-30%).',
            variables: [
              { id: 'connectedLoad', name: 'Connected Load', unit: 'kW', symbol: 'kW' },
              { id: 'demandFactor', name: 'Demand Factor', unit: '', symbol: '' },
              { id: 'powerFactor', name: 'Power Factor', unit: '', symbol: '' },
              { id: 'margin', name: 'Growth Margin', unit: '%', symbol: '%' }
            ],
            calculate: (inputs) => {
              const baseKVA = (inputs.connectedLoad * inputs.demandFactor) / inputs.powerFactor;
              const withMargin = baseKVA * (1 + inputs.margin/100);
              const standardKVA = [25, 50, 63, 100, 160, 200, 250, 315, 400, 500, 630, 800, 1000, 1250, 1600, 2000, 2500];
              const recommended = standardKVA.find(s => s >= withMargin) || 'Above 2500kVA';
              return { calculated: baseKVA.toFixed(2), withMargin: withMargin.toFixed(2), recommended };
            },
            resultLabel: 'Transformer kVA',
            multiResult: true
          },
          {
            id: 'generator-sizing',
            name: 'Generator Sizing Calculator',
            formula: 'kVA = (Running Load + Starting Load) / PF',
            explanation: 'Generator must handle running loads plus motor starting currents (typically 6× rated). Consider voltage dip during motor starting for critical loads.',
            variables: [
              { id: 'runningLoad', name: 'Running Load', unit: 'kW', symbol: 'kW' },
              { id: 'largestMotor', name: 'Largest Motor', unit: 'kW', symbol: 'kW' },
              { id: 'startingMultiplier', name: 'Starting Current Multiplier', unit: '', symbol: '' },
              { id: 'powerFactor', name: 'Power Factor', unit: '', symbol: '' }
            ],
            calculate: (inputs) => {
              const startingKW = inputs.largestMotor * inputs.startingMultiplier;
              const totalKW = inputs.runningLoad + startingKW - inputs.largestMotor;
              const kva = totalKW / inputs.powerFactor;
              return { kw: totalKW.toFixed(2), kva: kva.toFixed(2) };
            },
            resultLabel: 'Generator Capacity',
            multiResult: true
          }
        ]
      },
      {
        id: 'smart-grid',
        icon: '🌐',
        title: 'Smart Grid & Modern',
        description: 'Harmonics, Power Quality, Storage',
        calculators: [
          {
            id: 'thd',
            name: 'Total Harmonic Distortion (THD)',
            formula: 'THD = √(V₂² + V₃² + ... + Vₙ²) / V₁ × 100%',
            explanation: 'THD measures distortion in voltage or current waveform due to harmonics. High THD causes heating, equipment malfunction, and power quality issues.',
            variables: [
              { id: 'v1', name: 'Fundamental (V₁)', unit: 'Volts', symbol: 'V' },
              { id: 'v3', name: '3rd Harmonic (V₃)', unit: 'Volts', symbol: 'V' },
              { id: 'v5', name: '5th Harmonic (V₅)', unit: 'Volts', symbol: 'V' },
              { id: 'v7', name: '7th Harmonic (V₇)', unit: 'Volts', symbol: 'V' }
            ],
            calculate: (inputs) => {
              const harmonicsSum = Math.sqrt(
                (inputs.v3 || 0)**2 + (inputs.v5 || 0)**2 + (inputs.v7 || 0)**2
              );
              const thd = (harmonicsSum / inputs.v1) * 100;
              return thd.toFixed(2);
            },
            resultLabel: 'THD (%)'
          },
          {
            id: 'power-quality',
            name: 'Power Quality Index',
            formula: 'PQI = f(THD, PF, Voltage Deviation)',
            explanation: 'Power quality combines multiple factors: harmonic distortion, power factor, voltage stability, and frequency deviation. Good PQ is essential for sensitive equipment.',
            variables: [
              { id: 'thd', name: 'THD', unit: '%', symbol: '%' },
              { id: 'pf', name: 'Power Factor', unit: '', symbol: '' },
              { id: 'vdev', name: 'Voltage Deviation', unit: '%', symbol: '%' }
            ],
            calculate: (inputs) => {
              // Simple PQ scoring (100 = perfect)
              const thdScore = Math.max(0, 100 - inputs.thd * 5);
              const pfScore = inputs.pf * 100;
              const vScore = Math.max(0, 100 - inputs.vdev * 10);
              const pqi = (thdScore + pfScore + vScore) / 3;
              return { pqi: pqi.toFixed(1), grade: pqi > 90 ? 'Excellent' : pqi > 70 ? 'Good' : pqi > 50 ? 'Fair' : 'Poor' };
            },
            resultLabel: 'Power Quality Index',
            multiResult: true
          },
          {
            id: 'energy-storage',
            name: 'Energy Storage Sizing',
            formula: 'E = P × t / η',
            explanation: 'Energy storage capacity depends on required power, duration, and round-trip efficiency. Consider degradation over lifetime and depth of discharge limits.',
            variables: [
              { id: 'power', name: 'Required Power', unit: 'kW', symbol: 'kW' },
              { id: 'duration', name: 'Duration', unit: 'Hours', symbol: 'h' },
              { id: 'efficiency', name: 'Round-trip Efficiency', unit: '%', symbol: '%' },
              { id: 'dod', name: 'Max Depth of Discharge', unit: '%', symbol: '%' }
            ],
            calculate: (inputs) => {
              const usableEnergy = inputs.power * inputs.duration;
              const totalEnergy = usableEnergy / (inputs.efficiency/100);
              const installedCapacity = totalEnergy / (inputs.dod/100);
              return { 
                usable: usableEnergy.toFixed(2), 
                total: totalEnergy.toFixed(2),
                installed: installedCapacity.toFixed(2)
              };
            },
            resultLabel: 'Energy Storage (kWh)',
            multiResult: true
          },
          {
            id: 'demand-response',
            name: 'Demand Response Savings',
            formula: 'Savings = ΔP × Peak Rate × Hours',
            explanation: 'Demand response reduces load during peak periods for cost savings and grid stability. Calculate potential savings from load shifting or curtailment.',
            variables: [
              { id: 'loadReduction', name: 'Load Reduction', unit: 'kW', symbol: 'kW' },
              { id: 'peakRate', name: 'Peak Rate', unit: '$/kWh', symbol: '$/kWh' },
              { id: 'hours', name: 'Peak Hours/Day', unit: 'Hours', symbol: 'h' },
              { id: 'days', name: 'Days per Month', unit: 'Days', symbol: 'days' }
            ],
            calculate: (inputs) => {
              const dailySavings = inputs.loadReduction * inputs.peakRate * inputs.hours;
              const monthlySavings = dailySavings * inputs.days;
              const annualSavings = monthlySavings * 12;
              return { 
                daily: dailySavings.toFixed(2), 
                monthly: monthlySavings.toFixed(2),
                annual: annualSavings.toFixed(2)
              };
            },
            resultLabel: 'Savings ($)',
            multiResult: true
          }
        ]
      }
    ];

    // State
    let currentView = 'categories';
    let currentCategory = null;
    let currentCalculator = null;

    // Element SDK initialization
    if (window.elementSdk) {
      window.elementSdk.init({

        onConfigChange: async (config) => {

          document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
          document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
            },
            {
              get: () => config.secondary_color || defaultConfig.secondary_color,
              set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
            },
            {
              get: () => config.primary_color || defaultConfig.primary_color,
              set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['main_title', config.main_title || defaultConfig.main_title],
          ['subtitle', config.subtitle || defaultConfig.subtitle]
        ])
      });
    }

    // Render categories grid
    function renderCategories() {
      const container = document.getElementById('categories-view');
      container.innerHTML = categories.map(cat => `
        <button onclick="openCategory('${cat.id}')" class="category-card rounded-xl p-5 text-left hover:cursor-pointer fade-in">

            <span class="text-3xl">${cat.icon}</span>
            <h3 class="text-lg font-bold text-white">${cat.title}</h3>
          </div>

    // Open category
    function openCategory(catId) {
      currentCategory = categories.find(c => c.id === catId);
      currentView = 'category';
      renderCategoryCalculators();
    }

    // Render calculator list for a category
    function renderCategoryCalculators() {
      document.getElementById('categories-view').classList.add('hidden');
      document.getElementById('calculator-view').classList.remove('hidden');
      document.getElementById('home-btn').classList.remove('hidden');

        <div class="mb-6 fade-in">
          <div class="flex items-center gap-3 mb-2">

            <div>
              <h2 class="text-2xl font-bold text-white">${currentCategory.title}</h2>
              <p class="text-slate-400">${currentCategory.description}</p>

          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

            <button onclick="openCalculator('${calc.id}')" class="category-card rounded-xl p-4 text-left hover:cursor-pointer fade-in">
              <h3 class="font-semibold text-white mb-2">${calc.name}</h3>
              <p class="mono text-cyan-400 text-sm mb-2">${calc.formula}</p>

    // Open specific calculator
    function openCalculator(calcId) {
      currentCalculator = currentCategory.calculators.find(c => c.id === calcId);
      renderCalculator();
    }

    // Render calculator interface
    function renderCalculator() {
      const calc = currentCalculator;
      const container = document.getElementById('calc-content');
      
      container.innerHTML = `
        <div class="fade-in">
          <button onclick="backToCategory()" class="back-btn px-3 py-1.5 rounded-lg text-sm text-slate-300 mb-4">
            ← Back to ${currentCategory.title}
          </button>
          
          <div class="category-card rounded-xl p-6 mb-6">
            <h2 class="text-xl font-bold text-white mb-2">${calc.name}</h2>
            <div class="formula-box rounded-lg p-4 mb-4">
              <p class="text-xs text-amber-400 uppercase tracking-wide mb-1">Formula</p>
              <p class="mono text-lg text-amber-200">${calc.formula}</p>
            </div>
            <div class="explanation-box rounded-lg p-4">
              <p class="text-xs text-violet-400 uppercase tracking-wide mb-1">Explanation</p>
              <p class="text-slate-300 text-sm leading-relaxed">${calc.explanation}</p>
            </div>
          </div>
          
          <div class="category-card rounded-xl p-6">
            <h3 class="font-semibold text-white mb-4">Enter Values</h3>
            
            ${calc.variables.filter(v => v.id !== (calc.resultLabel ? '' : 'result')).map((v, idx) => `
              <div class="mb-4 input-flow" style="animation-delay: ${idx * 0.1}s">
                <label class="block text-sm text-slate-400 mb-1">${v.name} ${v.unit ? `(${v.unit})` : ''}</label>
                <input 
                  type="number" 
                  id="input-${v.id}" 
                  step="any"
                  placeholder="Enter ${v.symbol || v.name}"
                  class="calc-input w-full px-4 py-3 rounded-lg text-white mono"
                />
              </div>
            `).join('')}
            
            ${calc.variables.length > 2 && !calc.resultLabel ? `
              <div class="mb-4 input-flow" style="animation-delay: ${calc.variables.length * 0.1}s">
                <label class="block text-sm text-slate-400 mb-1">Solve For</label>
                <select id="solve-for" class="calc-input w-full px-4 py-3 rounded-lg text-white">
                  ${calc.variables.map(v => `<option value="${v.id}">${v.name}</option>`).join('')}
                </select>
              </div>
            ` : ''}
            
            <button onclick="calculate()" class="calc-btn w-full py-3 rounded-lg font-semibold text-white mt-2">
              Calculate
            </button>
            
            <div id="result-container" class="hidden mt-6">
              <div id="animation-container" class="mb-4"></div>
              
              <div class="result-box rounded-lg p-4 mb-4 result-animate">
                <p class="text-xs text-emerald-400 uppercase tracking-wide mb-2">Result</p>
                <div id="result-display" class="mono text-2xl text-emerald-300"></div>
              </div>
              
              <div class="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                <p class="text-xs text-blue-400 uppercase tracking-wide mb-3 font-semibold">Step-by-Step Solution</p>
                <div id="steps-display" class="space-y-3"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Calculate function with step-by-step explanation and animations
    function calculate() {
      const calc = currentCalculator;
      const inputs = {};
      
      calc.variables.forEach(v => {
        const input = document.getElementById(`input-${v.id}`);
        if (input && input.value) {
          inputs[v.id] = parseFloat(input.value);
        }
      });
      
      const solveFor = document.getElementById('solve-for')?.value;
      
      try {
        let result;
        let steps = [];
        
        if (calc.resultLabel || calc.multiResult) {
          result = calc.calculate(inputs);
          steps = generateSteps(calc, inputs);
        } else {
          result = calc.calculate(inputs, solveFor);
          steps = generateSteps(calc, inputs, solveFor);
        }
        
        const resultContainer = document.getElementById('result-container');
        const resultDisplay = document.getElementById('result-display');
        const stepsDisplay = document.getElementById('steps-display');
        const animContainer = document.getElementById('animation-container');
        
        resultContainer.classList.remove('hidden');
        
        // Generate context-specific animations
        const animHTML = generateAnimation(calc.id, inputs, result);
        animContainer.innerHTML = animHTML;
        
        if (typeof result === 'object' && result !== null) {
          resultDisplay.innerHTML = Object.entries(result).map(([key, value]) => {
            const displayKey = key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
            const formattedValue = typeof value === 'number' ? formatNumber(value) : value;
            return `<div class="mb-2"><span class="text-slate-400 text-sm">${displayKey}:</span> <span class="text-emerald-300">${formattedValue}</span></div>`;
          }).join('');
        } else {
          const label = calc.resultLabel || calc.variables.find(v => v.id === solveFor)?.name || 'Result';
          const unit = calc.variables.find(v => v.id === solveFor)?.unit || '';
          resultDisplay.innerHTML = `
            <div><span class="text-slate-400 text-sm">${label}:</span></div>
            <div class="text-2xl">${formatNumber(result)} ${unit}</div>
          `;
        }
        
        // Display step-by-step solution
        stepsDisplay.innerHTML = steps.map((step, idx) => `
          <div class="bg-slate-700/50 rounded p-3" style="animation: flowDown 0.6s ease-out ${idx * 0.1}s both">
            <p class="text-xs text-blue-300 font-semibold mb-1">Step ${idx + 1}: ${step.title}</p>
            <p class="text-slate-300 text-sm mono">${step.description}</p>
            ${step.formula ? `<p class="text-cyan-300 text-sm mt-1 mono">${step.formula}</p>` : ''}
          </div>
        `).join('');
      } catch (error) {
        const resultContainer = document.getElementById('result-container');
        const resultDisplay = document.getElementById('result-display');
        resultContainer.classList.remove('hidden');
        resultDisplay.innerHTML = `<span class="text-red-400">Error: Please check your inputs</span>`;
      }
    }

    // Generate context-specific animations based on calculator type
    function generateAnimation(calcId, inputs, result) {
      let html = '';
      
      if (calcId === 'ohms-law') {
        const voltage = inputs.voltage || (inputs.current * inputs.resistance);
        const current = inputs.current || (inputs.voltage / inputs.resistance);
        const resistance = inputs.resistance || (inputs.voltage / inputs.current);
        html = `
          <div class="circuit-diagram">
            <div class="component" style="left: 20px; top: 50px; width: 60px; height: 40px; background: rgba(14, 165, 233, 0.2); border: 2px solid #0ea5e9;">
              <span class="text-sm">+${voltage.toFixed(1)}V</span>
            </div>
            <div class="wire" style="top: 70px; left: 90px; width: 80px;"></div>
            <div class="component" style="left: 180px; top: 50px; width: 60px; height: 40px; background: rgba(56, 189, 248, 0.2); border: 2px solid #38bdf8;">
              <span class="text-sm">${resistance.toFixed(1)}Ω</span>
            </div>
            <div class="energy-flow" style="left: 100px; top: 69px; animation-delay: 0s;"></div>
            <div class="energy-flow" style="left: 150px; top: 69px; animation-delay: 0.5s;"></div>
            <div class="energy-flow" style="left: 200px; top: 69px; animation-delay: 1s;"></div>
          </div>
          <div class="text-center text-sm text-slate-400 mt-2">
            Current flowing: <span class="text-cyan-400 font-semibold">${current.toFixed(2)} A</span>
          </div>
        `;
      } else if (calcId === 'power-law') {
        const power = typeof result === 'object' ? result.powerW : result;
        const percentage = Math.min(100, (power / 1000) * 100);
        html = `
          <div class="mb-4">
            <p class="text-sm text-slate-400 mb-2">Power Dissipation Level</p>
            <div class="heat-map">
              <div class="heat-indicator" style="width: ${percentage}%; left: 0;"></div>
            </div>
            <p class="text-xs text-slate-500 text-right mt-1">${percentage.toFixed(1)}% of scale</p>
          </div>
        `;
      } else if (calcId === 'series-resistance') {
        let resistances = [];
        ['r1', 'r2', 'r3', 'r4'].forEach(k => {
          if (inputs[k]) resistances.push(inputs[k]);
        });
        const total = resistances.reduce((a, b) => a + b, 0);
        html = `
          <div class="bg-slate-700/30 rounded-lg p-4">
            <p class="text-sm text-slate-400 mb-3">Resistance Addition</p>
            <div class="flex items-center justify-between gap-2 mb-3">
              ${resistances.map((r, i) => `
                <div class="flex-1 text-center" style="animation: flowRight ${0.5 + i*0.1}s ease-out">
                  <div class="bg-slate-600/50 p-2 rounded mb-1">${r}Ω</div>
                  <div class="text-xs text-slate-500">R${i+1}</div>
                </div>
              `).join('')}
              <div class="text-cyan-400 text-lg font-bold">=</div>
              <div style="animation: flowDown 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)">
                <div class="bg-emerald-500/30 p-3 rounded border border-emerald-400">${total}Ω</div>
                <div class="text-xs text-emerald-400 text-center mt-1">Total</div>
              </div>
            </div>
          </div>
        `;
      } else if (calcId === 'parallel-resistance') {
        let resistances = [];
        ['r1', 'r2', 'r3', 'r4'].forEach(k => {
          if (inputs[k]) resistances.push(inputs[k]);
        });
        const total = resistances.length > 0 ? 1 / resistances.reduce((sum, r) => sum + 1/r, 0) : 0;
        html = `
          <div class="bg-slate-700/30 rounded-lg p-4">
            <p class="text-sm text-slate-400 mb-3">Parallel Resistance Network</p>
            <div class="space-y-2">
              ${resistances.map((r, i) => `
                <div class="flex items-center justify-between" style="animation: flowRight ${0.3 + i*0.1}s ease-out">
                  <span class="text-slate-400">R${i+1}</span>
                  <div class="flex-1 mx-2 h-1 bg-gradient-to-r from-slate-600 to-slate-700 rounded"></div>
                  <span class="text-cyan-400">${r}Ω</span>
                </div>
              `).join('')}
              <div class="border-t border-slate-600 pt-2 mt-2 text-center" style="animation: flowDown 1s ease-out">
                <p class="text-emerald-400 font-semibold">${total.toFixed(2)}Ω Total</p>
              </div>
            </div>
          </div>
        `;
      } else if (calcId === 'voltage-divider') {
        const vout = typeof result === 'object' ? Object.values(result)[0] : result;
        const percentage = (vout / inputs.vin) * 100;
        html = `
          <div class="mb-4">
            <p class="text-sm text-slate-400 mb-2">Voltage Division</p>
            <div class="space-y-2">
              <div>
                <div class="flex justify-between text-xs mb-1">
                  <span>Input: ${inputs.vin}V</span>
                  <span class="text-cyan-400">100%</span>
                </div>
                <div class="h-3 bg-gradient-to-r from-slate-600 to-slate-700 rounded overflow-hidden">
                  <div class="h-full progress-bar" style="--fill-width: 100%;"></div>
                </div>
              </div>
              <div>
                <div class="flex justify-between text-xs mb-1">
                  <span>Output: ${vout.toFixed(2)}V</span>

    // Generate step-by-step explanation
    function generateSteps(calc, inputs, solveFor) {
      const steps = [];
      const calc_id = calc.id;
      
      // Gather input step
      steps.push({
        title: 'Identify Given Values',
        description: Object.entries(inputs).map(([key, value]) => {
          const varInfo = calc.variables.find(v => v.id === key);
          return `${varInfo?.symbol || key} = ${value}`;
        }).join(', '),
        formula: null
      });
      
      // Show formula
      steps.push({
        title: 'Apply Formula',
        description: `Using the formula for ${calc.name}:`,
        formula: calc.formula
      });
      
      // Specific step-by-step for different calculators
      if (calc_id === 'ohms-law') {
        const { voltage, current, resistance } = inputs;
        if (solveFor === 'voltage') {
          steps.push({
            title: 'Substitute Values',
            description: `V = I × R`,
            formula: `V = ${current} × ${resistance}`
          });
          steps.push({
            title: 'Calculate',
            description: `Multiply current by resistance`,
            formula: `V = ${formatNumber(current * resistance)} V`
          });
        } else if (solveFor === 'current') {
          steps.push({
            title: 'Rearrange Formula',
            description: `V = I × R → I = V / R`,
            formula: null
          });
          steps.push({
            title: 'Substitute Values',
            description: `I = V / R`,
            formula: `I = ${voltage} / ${resistance}`
          });
          steps.push({
            title: 'Calculate',
            description: `Divide voltage by resistance`,
            formula: `I = ${formatNumber(voltage / resistance)} A`
          });
        } else if (solveFor === 'resistance') {
          steps.push({
            title: 'Rearrange Formula',
            description: `V = I × R → R = V / I`,
            formula: null
          });
          steps.push({
            title: 'Substitute Values',
            description: `R = V / I`,
            formula: `R = ${voltage} / ${current}`
          });
          steps.push({
            title: 'Calculate',
            description: `Divide voltage by current`,
            formula: `R = ${formatNumber(voltage / current)} Ω`
          });
        }
      } else if (calc_id === 'power-law') {
        const { power, voltage, current, resistance } = inputs;
        if (solveFor === 'power') {
          if (voltage && current) {
            steps.push({
              title: 'Substitute Values',
              description: `Using P = V × I (Voltage × Current method)`,
              formula: `P = ${voltage} × ${current}`
            });
            steps.push({
              title: 'Calculate',
              description: `Multiply voltage by current`,
              formula: `P = ${formatNumber(voltage * current)} W`
            });
          }
        }
      } else if (calc_id === 'coulombs-law') {
        const { force, q1, q2, distance } = inputs;
        const k = 8.99e9;
        if (solveFor === 'force') {
          steps.push({
            title: 'Set Constant',
            description: `Coulomb constant k = 8.99 × 10⁹ N·m²/C²`,
            formula: null
          });
          steps.push({
            title: 'Substitute Values',
            description: `F = k × (q₁ × q₂) / r²`,
            formula: `F = 8.99×10⁹ × (${q1} × ${q2}) / ${distance}²`
          });
          steps.push({
            title: 'Calculate Numerator',
            description: `Multiply charges and Coulomb constant`,
            formula: `Numerator = 8.99×10⁹ × ${q1 * q2} = ${formatNumber(k * q1 * q2)}`
          });
          steps.push({
            title: 'Calculate Denominator',
            description: `Square the distance`,
            formula: `Denominator = ${distance}² = ${distance * distance}`
          });
          steps.push({
            title: 'Final Division',
            description: `Divide numerator by denominator`,
            formula: `F = ${formatNumber(k * (q1 * q2) / (distance * distance))} N`
          });
        }
      } else if (calc_id === 'series-resistance') {
        steps.push({
          title: 'Sum All Resistances',
          description: `In series circuit, add all resistances:`,
          formula: `R_total = R₁ + R₂ + R₃ + R₄`
        });
        let total = 0;
        let calculation = [];
        ['r1', 'r2', 'r3', 'r4'].forEach(key => {
          if (inputs[key]) {
            total += inputs[key];
            calculation.push(inputs[key]);
          }
        });
        steps.push({
          title: 'Substitute Values',
          description: `Enter your resistance values:`,
          formula: calculation.join(' + ')
        });
        steps.push({
          title: 'Calculate',
          description: `Add all values together`,
          formula: `R_total = ${formatNumber(total)} Ω`
        });
      } else if (calc_id === 'parallel-resistance') {
        steps.push({
          title: 'Use Parallel Formula',
          description: `For parallel circuits, use reciprocal method:`,
          formula: `1/R_total = 1/R₁ + 1/R₂ + 1/R₃ + 1/R₄`
        });
        let sum = 0;
        let calculation = [];
        ['r1', 'r2', 'r3', 'r4'].forEach(key => {
          if (inputs[key]) {
            sum += 1/inputs[key];
            calculation.push(`1/${inputs[key]}`);
          }
        });
        steps.push({
          title: 'Calculate Reciprocals',
          description: `Find reciprocal of each resistance:`,
          formula: calculation.join(' + ')
        });
        steps.push({
          title: 'Sum Reciprocals',
          description: `Add all reciprocal values`,
          formula: `Sum = ${formatNumber(sum)}`
        });
        steps.push({
          title: 'Take Reciprocal of Sum',
          description: `Invert the result to get total resistance`,
          formula: `R_total = 1 / ${formatNumber(sum)} = ${formatNumber(1/sum)} Ω`
        });
      } else if (calc_id === 'voltage-divider') {
        const { vin, r1, r2 } = inputs;
        steps.push({
          title: 'Apply Voltage Divider Rule',
          description: `Output voltage is input voltage multiplied by ratio:`,
          formula: `V_out = V_in × (R₂ / (R₁ + R₂))`
        });
        steps.push({
          title: 'Calculate Total Resistance',
          description: `Sum the two resistances:`,
          formula: `R_total = ${r1} + ${r2} = ${formatNumber(r1 + r2)} Ω`
        });
        steps.push({
          title: 'Calculate Ratio',
          description: `Find the ratio R₂/(R₁+R₂):`,
          formula: `Ratio = ${r2} / ${formatNumber(r1 + r2)} = ${formatNumber(r2 / (r1 + r2))}`
        });
        steps.push({
          title: 'Calculate Output Voltage',
          description: `Multiply input voltage by ratio:`,
          formula: `V_out = ${vin} × ${formatNumber(r2 / (r1 + r2))} = ${formatNumber(vin * (r2 / (r1 + r2)))} V`
        });
      } else if (calc_id === 'rms-values') {
        const { vpeak } = inputs;
        steps.push({
          title: 'Calculate RMS Value',
          description: `RMS is peak divided by √2 (approximately 0.707):`,
          formula: `V_rms = V_peak / √2 = ${vpeak} / 1.414`
        });
        steps.push({
          title: 'RMS Result',
          description: ``,
          formula: `V_rms = ${formatNumber(vpeak / Math.sqrt(2))} V`
        });
        steps.push({
          title: 'Calculate Average Value',
          description: `Average is 0.637 times peak:`,
          formula: `V_avg = 0.637 × ${vpeak}`
        });
        steps.push({
          title: 'Average Result',
          description: ``,
          formula: `V_avg = ${formatNumber(vpeak * 0.637)} V`
        });
        steps.push({
          title: 'Calculate Peak-to-Peak',
          description: `Peak-to-peak is 2 times peak value:`,
          formula: `V_pp = 2 × ${vpeak}`
        });
        steps.push({
          title: 'Peak-to-Peak Result',
          description: ``,
          formula: `V_pp = ${formatNumber(vpeak * 2)} V`
        });
      } else if (calc_id === 'inductive-reactance') {
        const { frequency, inductance } = inputs;
        steps.push({
          title: 'Use Inductive Reactance Formula',
          description: `Inductive reactance depends on frequency and inductance:`,
          formula: `X_L = 2πfL`
        });
        steps.push({
          title: 'Calculate 2π',
          description: `Calculate 2π constant:`,
          formula: `2π ≈ 6.283`
        });
        steps.push({
          title: 'Multiply Constants',
          description: `Multiply 2π by frequency and inductance:`,
          formula: `X_L = 6.283 × ${frequency} × ${inductance}`
        });
        steps.push({
          title: 'Calculate Result',
          description: `Final calculation:`,
          formula: `X_L = ${formatNumber(2 * Math.PI * frequency * inductance)} Ω`
        });
      } else if (calc_id === 'synchronous-speed') {
        const { frequency, poles } = inputs;
        steps.push({
          title: 'Apply Synchronous Speed Formula',
          description: `Synchronous speed depends on frequency and pole pairs:`,
          formula: `N_s = 120 × f / P`
        });
        steps.push({
          title: 'Identify Values',
          description: `Frequency = ${frequency} Hz, Poles = ${poles}`,
          formula: null
        });
        steps.push({
          title: 'Calculate',
          description: `Multiply frequency by 120 and divide by poles:`,
          formula: `N_s = 120 × ${frequency} / ${poles}`
        });
        steps.push({
          title: 'Result',
          description: `Synchronous speed in RPM:`,
          formula: `N_s = ${formatNumber((120 * frequency) / poles)} RPM`
        });
      } else if (calc_id === 'three-phase-power') {
        const { vl, il, pf } = inputs;
        steps.push({
          title: 'Use Three-Phase Power Formula',
          description: `Three-phase power includes √3 factor:`,
          formula: `P = √3 × V_L × I_L × cos(φ)`
        });
        steps.push({
          title: 'Calculate √3',
          description: `Square root of 3:`,
          formula: `√3 ≈ 1.732`
        });
        steps.push({
          title: 'Substitute Values',
          description: `Input all parameters:`,
          formula: `P = 1.732 × ${vl} × ${il} × ${pf}`
        });
        steps.push({
          title: 'Calculate Real Power',
          description: `Multiply all values:`,
          formula: `P = ${formatNumber(Math.sqrt(3) * vl * il * pf)} W`
        });
      }
      
      return steps;
    }

    // Format number for display
    function formatNumber(num) {
      if (num === undefined || num === null || isNaN(num)) return 'N/A';
      if (!isFinite(num)) return 'Infinity';
      
      const absNum = Math.abs(num);
      if (absNum === 0) return '0';
      if (absNum < 0.0001 || absNum >= 1e9) {
        return num.toExponential(4);
      }
      if (absNum < 1) {
        return num.toPrecision(4);
      }
      return num.toLocaleString('en-US', { maximumFractionDigits: 4 });
    }
